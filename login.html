<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cod web - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Cod Login</h1>
        <img src="img/img-login.webp" alt="imagem de login web">
        <p>Sua segurança em primeiro lugar</p>

        <form action="text">
            <input type="email" placeholder="Digite seu Gmail">
            <input type="password" placeholder="Digite sua senha">
            <p>Não tenho conta? <a href="#">Cadastra-se</a></p>
        </form>
        <button id="button" onclick="">ENTRAR</button>
    </div>

</body>

</html>
